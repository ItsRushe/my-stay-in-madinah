<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Green background -->
  <rect width="900" height="600" fill="#006C35"/>

  <!-- Sword (tilted slightly, centered) -->
  <!-- Blade: long thin parallelogram pointing right -->
  <polygon points="200,285 680,258 680,275 200,310" fill="#FFFFFF"/>
  <!-- Tip -->
  <polygon points="680,258 720,266 680,275" fill="#FFFFFF"/>
  <!-- Guard (crossguard) -->
  <rect x="192" y="255" width="18" height="68" rx="4" fill="#FFFFFF"/>
  <!-- Grip -->
  <rect x="150" y="268" width="50" height="16" rx="3" fill="#FFFFFF"/>
  <!-- Pommel -->
  <ellipse cx="148" cy="276" rx="16" ry="20" fill="#FFFFFF"/>

  <!-- Simplified Shahada: three horizontal calligraphic bars above sword -->
  <!-- Top line (longer) -->
  <rect x="240" y="175" width="420" height="14" rx="7" fill="#FFFFFF"/>
  <!-- Second line (medium) -->
  <rect x="280" y="203" width="340" height="12" rx="6" fill="#FFFFFF"/>
  <!-- Third line (shorter) -->
  <rect x="320" y="228" width="260" height="11" rx="5" fill="#FFFFFF"/>

  <!-- Decorative dots (mimicking Arabic letter dots) -->
  <circle cx="300" cy="160" r="8" fill="#FFFFFF"/>
  <circle cx="335" cy="158" r="8" fill="#FFFFFF"/>
  <circle cx="560" cy="160" r="8" fill="#FFFFFF"/>
  <circle cx="600" cy="158" r="8" fill="#FFFFFF"/>
  <circle cx="390" cy="218" r="7" fill="#FFFFFF"/>
  <circle cx="500" cy="218" r="7" fill="#FFFFFF"/>
</svg>
